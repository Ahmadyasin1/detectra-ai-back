<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detectra AI | Minimal Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8 bg-gray-900 text-white">
  <h1 class="text-3xl font-bold mb-4">Detectra AI — Minimal Dashboard</h1>
  <p>API health: <span id="status">checking…</span></p>
  <script>
    async function checkHealth(){
      try{
        const r = await fetch('/health');
        const j = await r.json();
        document.getElementById('status').textContent = j.status + ' (v ' + j.version + ')';
      }catch(e){
        document.getElementById('status').textContent = 'offline';
      }
    }
    checkHealth();
    setInterval(checkHealth,5000);
  </script>
</body>
</html>
