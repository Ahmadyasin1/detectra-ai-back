# ═══════════════════════════════════════════════════════════════════════════════
# Detectra AI — Nginx Reverse Proxy (Production)
# Entry point: port 80
#   /api, /health, /ws  →  detectra_api:8000      (FastAPI)
#   everything else     →  detectra_frontend:80    (Vite/Nginx static)
# ═══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # ── Compression ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff2;

    # ── Rate limiting ────────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=30r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;

    # ── Upstreams ────────────────────────────────────────────────────────────────
    upstream detectra_api {
        server api:8000;
        keepalive 32;
    }

    upstream detectra_frontend {
        server frontend:80;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # Allow large video uploads (600 MB max)
        client_max_body_size 600M;
        client_body_timeout  300s;
        send_timeout         300s;

        # ── Security headers ─────────────────────────────────────────────────────
        add_header X-Frame-Options      "SAMEORIGIN"                   always;
        add_header X-Content-Type-Options "nosniff"                    always;
        add_header Referrer-Policy      "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection     "1; mode=block"                always;

        # ── Health check ─────────────────────────────────────────────────────────
        location = /health {
            proxy_pass       http://detectra_api;
            proxy_set_header Host $host;
            proxy_read_timeout 5s;
            access_log off;
        }

        # ── WebSocket (real-time progress) ───────────────────────────────────────
        location /ws/ {
            proxy_pass         http://detectra_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Video upload (strict rate limit) ─────────────────────────────────────
        location = /api/analyze {
            limit_req zone=upload_limit burst=3 nodelay;
            proxy_pass                  http://detectra_api;
            proxy_set_header            Host            $host;
            proxy_set_header            X-Real-IP       $remote_addr;
            proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout          600s;
            proxy_send_timeout          600s;
            proxy_request_buffering     off;
        }

        # ── API endpoints ────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://detectra_api;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Connection      "";
            proxy_http_version 1.1;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # ── Frontend SPA (React) ──────────────────────────────────────────────────
        location / {
            proxy_pass         http://detectra_frontend;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }
    }
}
