name: Detectra AI — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─── Backend: Lint + Type-check + Tests ──────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER:     detectra
          POSTGRES_PASSWORD: detectra_pass
          POSTGRES_DB:       detectra_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps
        run: sudo apt-get install -y ffmpeg libgomp1

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio httpx
          # Install CPU-only torch first (faster in CI)
          pip install torch==2.4.1+cpu torchvision==0.19.1+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # Non-blocking for now

      - name: Run tests
        env:
          POSTGRES_USER:     detectra
          POSTGRES_PASSWORD: detectra_pass
          POSTGRES_HOST:     localhost
          POSTGRES_PORT:     5432
          POSTGRES_DB:       detectra_test
          REDIS_URL:         redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          SECRET_KEY:        test_secret_key_for_ci_only
          ENVIRONMENT:       test
        run: pytest tests/ -v --tb=short -x

      - name: Build Docker image
        run: docker build -t detectra-backend:ci .

  # ─── Frontend: Lint + Type-check + Build ─────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  # ─── Docker Compose Integration Test ─────────────────────────────────────────
  integration:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - name: Copy env file
        run: cp backend/.env.example backend/.env
      - name: Build all services
        run: docker compose build --parallel
      - name: Smoke test
        run: |
          docker compose up -d postgres redis backend
          sleep 30
          curl -f http://localhost:8000/health
          docker compose down
